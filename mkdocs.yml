site_name: OCTA Agentic Platform — Architecture
site_description: High-Level Design, Key Design Decisions, and Open Questions for the OCTA Agentic Platform.
# Set these once the GitHub repository URL is known:
# site_url: https://<org>.github.io/<repo>/
# repo_url: https://github.com/<org>/<repo>
# repo_name: <org>/<repo>

# Only content under docs_dir (new-structure) is published. The deprecated root
# HLD-old.md lives outside docs_dir and is intentionally never part of the site.
docs_dir: new-structure

theme:
  name: material
  language: en
  icon:
    logo: material/sitemap
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
    - search.share

nav:
  - Home: index.md
  - High-Level Design: docs/HLD.md
  - Decisions (KDDs): decisions/index.md
  - Open Questions: open-questions/index.md
  - Iteration Log: docs/CHANGELOG.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# READMEs hold authoring conventions, not site content. Workspace tooling folders
# are not part of the published site.
exclude_docs: |
  **/README.md
  scripts/
  .ailz/
  .copilot-tracking/
  sections/

# Many KDD/OQ pages are reached from the generated index tables rather than the
# top nav, and the HLD links to source assets outside docs_dir. Keep the build quiet.
validation:
  nav:
    omitted_files: ignore
  links:
    absolute_links: ignore
    unrecognized_links: ignore
    not_found: warn
